name: Build and test backend

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Restore dependencies
        run: dotnet restore RestaurantMenu.slnx

      - name: Build solution
        run: dotnet build RestaurantMenu.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test RestaurantMenu.slnx --configuration Release --no-build